name: fit_track
description: A beautiful and intuitive fitness tracker mobile application built with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'        # ← change from >=2.19.0 <3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  percent_indicator: ^4.1.1
  provider: ^6.0.0
  uuid: ^4.0.0
  google_fonts: ^6.1.0
  firebase_core: ^3.0.0         # ← update from ^2.32.0
  firebase_auth: ^5.0.0         # ← update from ^4.16.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  http: ^1.1.0
  flutter_dotenv: ^6.0.1
  pedometer: ^4.0.1
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  
dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/    
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
